services:
  - type: web
    name: squidjob-hub
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: squidjob-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: "5000"
    healthCheckPath: /health

# pgvector is enabled at runtime via server migrations: CREATE EXTENSION IF NOT EXISTS vector
# Render managed Postgres supports extensions on all plans
databases:
  - name: squidjob-db
    databaseName: squidjob
    user: squidjob_user
    plan: starter
    postgresMajorVersion: "16"
    ipAllowList: []
